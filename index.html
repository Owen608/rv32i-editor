<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RV32I 在线编辑器 Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>RV32I 在线编辑器 Demo</h1>
    <div class="toolbar">
      <span>模式：内置汇编器 + 内置简易 C</span>
      <button id="btnAssemble">汇编 / 编译</button>
      <button id="btnCompileC">C → 汇编</button>
      <span id="status"></span>
    </div>
  </header>
  <div class="app-shell">
    <aside id="cloudSidebar" class="cloud-sidebar">
      <div class="cloud-head">
        <button id="btnCloudToggle" class="btn-secondary cloud-toggle" title="折叠/展开">文件</button>
        <div class="cloud-head-actions">
          <button id="btnCloudRefresh" class="btn-secondary" title="刷新列表">刷新</button>
          <button id="btnCloudNew" class="btn-secondary" title="新建 txt">新建</button>
        </div>
      </div>
      <div id="cloudBody" class="cloud-body">
        <div class="cloud-hint">云端文件（localhost → storage/）</div>
        <div id="cloudFiles" class="cloud-files"></div>
      </div>
    </aside>
    <main>
    <section class="panel c-panel">
      <div class="panel-head">
        <h2>C 源代码（简易子集，编译为 RV32I 汇编）</h2>
        <div class="panel-actions">
          <select id="cIoMode" class="io-mode" title="加载/保存来源">
            <option value="local" selected>本地</option>
            <option value="localhost">localhost</option>
          </select>
          <input id="cIoName" class="io-name" placeholder="文件名（如 demo.c.txt）" value="c-source.txt" />
          <button id="btnCLoadTxt" class="btn-secondary">加载 TXT</button>
          <button id="btnCSaveTxt" class="btn-secondary">保存 TXT</button>
        </div>
      </div>
      <div class="c-editor-options">
        <label><input type="checkbox" id="cAutoComplete" checked> 自动补全</label>
        <label>Tab 宽度：<select id="cTabSize"><option value="2">2 格</option><option value="4" selected>4 格</option><option value="8">8 格</option></select></label>
      </div>
      <textarea id="cSource" spellcheck="false" placeholder="示例：
int main() {
  int x = 1;
  x += 2;
  return x;
}"></textarea>
    </section>
    <section class="panel editor-panel">
      <div class="panel-head">
        <h2>汇编源码 <span class="hint">（点击行首圆点设置/取消断点）</span></h2>
        <div class="panel-actions">
          <select id="asmIoMode" class="io-mode" title="加载/保存来源">
            <option value="local" selected>本地</option>
            <option value="localhost">localhost</option>
          </select>
          <input id="asmIoName" class="io-name" placeholder="文件名（如 demo.s.txt）" value="asm-source.txt" />
          <button id="btnAsmLoadTxt" class="btn-secondary">加载 TXT</button>
          <button id="btnAsmSaveTxt" class="btn-secondary">保存 TXT</button>
        </div>
      </div>
      <div class="asm-editor-options">
        <label>Tab 宽度：<select id="asmTabSize"><option value="2">2 格</option><option value="4" selected>4 格</option><option value="8">8 格</option></select></label>
      </div>
      <div class="editor-wrap">
        <div id="sourceGutter" class="editor-gutter"></div>
        <textarea id="source" spellcheck="false">.text
.globl _start
_start:
  addi a0, x0, 1
  addi a1, x0, 2
  add  a0, a0, a1
  addi a7, x0, 93
  ecall
</textarea>
      </div>
    </section>
    <section class="panel output-panel">
      <div class="panel-head">
        <h2>机器码 / 反汇编</h2>
        <div class="panel-actions">
          <select id="outIoMode" class="io-mode" title="加载/保存来源">
            <option value="local" selected>本地</option>
            <option value="localhost">localhost</option>
          </select>
          <input id="outIoName" class="io-name" placeholder="文件名（如 out.txt）" value="machine-disasm.txt" />
          <button id="btnOutLoadTxt" class="btn-secondary">加载 TXT</button>
          <button id="btnOutSaveTxt" class="btn-secondary">保存 TXT</button>
        </div>
      </div>
      <div id="machineCode" class="machine-code-wrap"></div>
    </section>
    <section class="panel exec-panel">
      <h2>执行</h2>
      <div class="exec-toolbar">
        <button id="btnLoad">加载到模拟器</button>
        <button id="btnStep">单步</button>
        <button id="btnRun">连续</button>
        <button id="btnStop">停止</button>
        <button id="btnReset">重置</button>
        <label>数据区 (KB，1–1024): <input type="number" id="dataSizeKB" min="1" max="1024" value="64" style="width:4em"></label>
      </div>
      <div class="io-panel">
        <div class="io-col">
          <h3>输入 (stdin)</h3>
          <div class="io-actions">
            <button id="btnSendStdin" class="btn-secondary btn-tiny" title="智能识别并发送输入">发送</button>
            <span id="ioState" class="io-state"></span>
          </div>
          <textarea id="stdinArea" class="io-textarea" spellcheck="false" placeholder="整数：用空格/换行分隔，例如：1 2 3&#10;文本：直接输入字符（ASCII）"></textarea>
        </div>
        <div class="io-col">
          <h3>输出 (stdout)</h3>
          <div class="io-actions">
            <button id="btnClearStdout" class="btn-secondary btn-tiny">清空输出</button>
          </div>
          <textarea id="stdoutArea" class="io-textarea" spellcheck="false" readonly placeholder="程序输出会显示在这里"></textarea>
        </div>
      </div>
      <div class="regs-grid">
        <h3>寄存器</h3>
        <div id="regs" class="regs-table"></div>
      </div>
      <div class="pc-line">PC: <code id="pcVal">0x00000000</code></div>
      <div class="data-memory-panel">
        <h3>数据区内存 (0x80000000 起，按字)</h3>
        <div id="dataMemory" class="data-memory-table"></div>
      </div>
    </section>
    </main>
  </div>
  <div id="cloudModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop" data-close="1"></div>
    <div class="modal-card">
      <div class="modal-head">
        <div class="modal-title">编辑：<span id="cloudModalName"></span></div>
        <button id="btnCloudModalClose" class="btn-secondary" title="关闭">关闭</button>
      </div>
      <textarea id="cloudModalText" class="modal-text" spellcheck="false"></textarea>
      <div class="modal-actions">
        <button id="btnCloudModalSave" class="btn-secondary">保存到云端</button>
      </div>
    </div>
  </div>
  <script src="assembler.js"></script>
  <script src="simulator.js"></script>
  <script src="app.js"></script>
</body>
</html>
